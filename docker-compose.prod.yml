services:
  mongo:
    image: mongo:7
    container_name: tortoise-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # No port exposed publicly — only accessible internally
    networks:
      - internal

  track-api:
    build:
      context: .
      dockerfile: track-api/Dockerfile
    container_name: tortoise-track-api
    restart: unless-stopped
    environment:
      PORT: 8080
      MONGO_URL: ${MONGO_URL}
      JWT_SECRET: ${JWT_SECRET}
      SIM_TRACK_CLEANUP_ENABLED: ${SIM_TRACK_CLEANUP_ENABLED:-true}
      SIM_TRACK_RETENTION_DAYS: ${SIM_TRACK_RETENTION_DAYS:-60}
      SIM_TRACK_CLEANUP_INTERVAL_MINUTES: ${SIM_TRACK_CLEANUP_INTERVAL_MINUTES:-60}
      SIM_TRACK_CLEANUP_INITIAL_DELAY_MINUTES: ${SIM_TRACK_CLEANUP_INITIAL_DELAY_MINUTES:-2}
      SIM_TRACK_SERIALS: ${SIM_TRACK_SERIALS:-9900111001,9900111002,9900111003,9900111004,9900111005,9900111006,9900111007,9900111008,9900111009,9900111010,9900111011,9900111012,9900111013,9900111014,9900111015,9900111016,9900111017,9900111018,9900111019,9900111020,9900111021,9900111022,9900111023,9900111024,9900111025,9900111026,9900111027,9900111028,9900111029,9900111030}
    depends_on:
      - mongo
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  track-tcp:
    build:
      context: .
      dockerfile: track-tcp/Dockerfile
    container_name: tortoise-track-tcp
    restart: unless-stopped
    ports:
      - "5000:5000"   # Public — GPS hardware connects here
    environment:
      TCP_PORT: 5000
      API_URL: http://track-api:8080/api
    depends_on:
      track-api:
        condition: service_healthy
    networks:
      - internal

  track-app:
    build:
      context: .
      dockerfile: track-app/Dockerfile
      args:
        # Points to the public subdomain — baked into the JS bundle at build time
        VITE_API_URL: https://tortoisegps.didtor.dev/api
    container_name: tortoise-track-app
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      track-api:
        condition: service_healthy

  tracker-simulator:
    build:
      context: .
      dockerfile: tracker-simulator/Dockerfile
    container_name: tortoise-tracker-simulator
    restart: unless-stopped
    environment:
      TCP_PORT: 5000
      TCP_HOST: track-tcp
      API_URL: http://track-api:8080/api
      SIM_STATE_FILE: /sim-state/state.json
      SIM_HEARTBEAT_FILE: /sim-state/heartbeat
    volumes:
      - simulator-state:/sim-state
    depends_on:
      - track-tcp
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: tortoise-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal
    depends_on:
      - track-app
      - track-api

networks:
  internal:
    driver: bridge

volumes:
  mongo-data:
  caddy-data:
  caddy-config:
  simulator-state:
