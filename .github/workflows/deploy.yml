name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-master-production
  cancel-in-progress: false

jobs:
  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run all workspace tests
        run: |
          npm run test:api
          npm run test:tcp
          npm run test:utils
          npm run test:data
          npm run test:sim

      - name: TypeScript check (frontend)
        run: cd track-app && npx tsc --noEmit

  # ── Deploy to Hetzner ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 204.168.227.78
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 25m
          script_stop: true
          script: |
            cd /opt/tortoise-gps
            bash deploy/deploy.sh
