query BackofficeCompanies {
  backofficeCompanies {
    id
    name
    slug
    active
    featureKeys
  }
}

query BackofficeUsers($companyId: ID, $offset: Int = 0, $limit: Int = 20) {
  backofficeUsers(companyId: $companyId, offset: $offset, limit: $limit) {
    totalCount
    items {
      id
      name
      surname
      email
      language
      role
      companyId
      permissionKeys
    }
  }
}

mutation BackofficeCreateCompany($input: BackofficeCreateCompanyInput!) {
  backofficeCreateCompany(input: $input) {
    success
    message
  }
}

mutation BackofficeUpdateCompany(
  $id: ID!
  $input: BackofficeUpdateCompanyInput!
) {
  backofficeUpdateCompany(id: $id, input: $input) {
    success
    message
  }
}

mutation BackofficeCreateUser($input: BackofficeCreateUserInput!) {
  backofficeCreateUser(input: $input) {
    success
    message
  }
}

mutation BackofficeCreateTracker($input: BackofficeCreateTrackerInput!) {
  backofficeCreateTracker(input: $input) {
    success
    message
  }
}

query BackofficeTrackers($companyId: ID, $offset: Int = 0, $limit: Int = 20) {
  backofficeTrackers(companyId: $companyId, offset: $offset, limit: $limit) {
    totalCount
    items {
      id
      serialNumber
      alias
      emoji
    }
  }
}

query BackofficeTracker($id: ID!) {
  backofficeTracker(id: $id) {
    id
    serialNumber
    alias
    emoji
  }
}

mutation BackofficeUpdateTrackerAlias($id: ID!, $alias: String!) {
  backofficeUpdateTrackerAlias(id: $id, alias: $alias) {
    success
    message
  }
}

mutation BackofficeUpdateUser($id: ID!, $input: BackofficeUpdateUserInput!) {
  backofficeUpdateUser(id: $id, input: $input) {
    success
    message
  }
}
