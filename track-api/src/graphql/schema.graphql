scalar DateTime

type User {
  id: ID!
  name: String!
  surname: String!
  email: String!
  language: String!
  role: String!
  companyId: ID
  permissionKeys: [String!]!
  featureKeys: [String!]!
}

type Company {
  id: ID!
  name: String!
  slug: String!
  active: Boolean!
  featureKeys: [String!]!
}

type BackofficeUser {
  id: ID!
  name: String!
  surname: String!
  email: String!
  language: String!
  role: String!
  companyId: ID
  permissionKeys: [String!]!
}

type PagedTrackers {
  items: [Tracker!]!
  totalCount: Int!
}

type PagedPOIs {
  items: [POI!]!
  totalCount: Int!
}

type PagedBackofficeUsers {
  items: [BackofficeUser!]!
  totalCount: Int!
}

type Tracker {
  id: ID!
  serialNumber: String!
  alias: String
  emoji: String
}

type Track {
  id: ID!
  serialNumber: String!
  latitude: Float!
  longitude: Float!
  speed: Float!
  status: String!
  date: DateTime!
}

type LiveTrack {
  serialNumber: String!
  latitude: Float!
  longitude: Float!
  speed: Float!
  status: String!
  date: DateTime!
  alias: String
}

type POI {
  id: ID!
  title: String!
  color: String!
  emoji: String
  latitude: Float!
  longitude: Float!
}

type AuthPayload {
  token: String!
}

type MutationResult {
  success: Boolean!
  message: String!
}

input RegisterUserInput {
  name: String!
  surname: String!
  email: String!
  password: String!
  language: String
}

input UpdateUserInput {
  name: String
  surname: String
  email: String
  language: String
  currentPassword: String
  newPassword: String
}

input BackofficeCreateCompanyInput {
  name: String!
  slug: String
  active: Boolean
  featureKeys: [String!]
}

input BackofficeUpdateCompanyInput {
  name: String
  slug: String
  active: Boolean
  featureKeys: [String!]
}

input BackofficeCreateUserInput {
  name: String!
  surname: String!
  email: String!
  password: String!
  language: String
  role: String!
  companyId: ID!
  permissionKeys: [String!]
}

input BackofficeUpdateUserInput {
  name: String
  surname: String
  email: String
  language: String
  role: String
  companyId: ID
  permissionKeys: [String!]
}

input BackofficeCreateTrackerInput {
  serialNumber: String!
  alias: String
  emoji: String
  companyId: ID!
}

input BackofficeUpdateTrackerInput {
  alias: String
  emoji: String
}

input AddTrackerInput {
  serialNumber: String!
  alias: String
  emoji: String
}

input UpdateTrackerInput {
  serialNumber: String
  alias: String
  emoji: String
}

input AddPOIInput {
  title: String!
  color: String!
  emoji: String
  latitude: Float!
  longitude: Float!
}

input UpdatePOIInput {
  title: String
  color: String
  emoji: String
  latitude: Float
  longitude: Float
}

type Query {
  me: User!
  trackers(offset: Int = 0, limit: Int = 20): PagedTrackers!
  tracker(id: ID!): Tracker!
  trackerBySN(serialNumber: String!): Tracker!
  trackerByAlias(alias: String!): Tracker!
  lastTracks: [LiveTrack!]!
  lastTrack(trackerId: ID!): Track
  trackRange(trackerId: ID!, start: DateTime!, end: DateTime!): [Track!]!
  pois(offset: Int = 0, limit: Int = 20): PagedPOIs!
  poi(id: ID!): POI!
  backofficeCompanies: [Company!]!
  backofficeUsers(
    companyId: ID
    offset: Int = 0
    limit: Int = 20
  ): PagedBackofficeUsers!
  backofficeTrackers(
    companyId: ID
    offset: Int = 0
    limit: Int = 20
  ): PagedTrackers!
  backofficeTracker(id: ID!): Tracker!
}

type Mutation {
  registerUser(input: RegisterUserInput!): MutationResult!
  loginUser(email: String!, password: String!): AuthPayload!
  updateUser(input: UpdateUserInput!): MutationResult!
  deleteUser: MutationResult!
  addTracker(input: AddTrackerInput!): MutationResult!
  updateTracker(id: ID!, input: UpdateTrackerInput!): MutationResult!
  deleteTracker(id: ID!): MutationResult!
  addPOI(input: AddPOIInput!): MutationResult!
  updatePOI(id: ID!, input: UpdatePOIInput!): MutationResult!
  deletePOI(id: ID!): MutationResult!
  backofficeCreateCompany(input: BackofficeCreateCompanyInput!): MutationResult!
  backofficeUpdateCompany(
    id: ID!
    input: BackofficeUpdateCompanyInput!
  ): MutationResult!
  backofficeCreateUser(input: BackofficeCreateUserInput!): MutationResult!
  backofficeCreateTracker(input: BackofficeCreateTrackerInput!): MutationResult!
  backofficeUpdateTrackerAlias(id: ID!, alias: String!): MutationResult!
  backofficeUpdateTracker(id: ID!, input: BackofficeUpdateTrackerInput!): MutationResult!
  backofficeUpdateUser(
    id: ID!
    input: BackofficeUpdateUserInput!
  ): MutationResult!
}

type Subscription {
  liveTracksUpdated: [LiveTrack!]!
}
